apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  labels:
    app: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels:
        app: core
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: migrate
          image: ghcr.io/lootopia-org/server:latest
          command: ["/app/migrate"]
          envFrom:
            - configMapRef:
                name: app-config
      containers:
        - name: server
          image: ghcr.io/lootopia-org/server:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "512Mi"
      volumes:
        - name: env-file
          configMap:
            name: env
